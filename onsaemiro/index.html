<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>온새미로</title>

    <link rel="stylesheet" href="../assets/css/paper-font.css">
    <link rel="stylesheet" href="../assets/css/font.css">
    <link rel="stylesheet" href="../css/default.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css"/>
    <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>
    <link rel="stylesheet" href="../onsaemiro/css/main.css">
</head>
<body>
    <div id="wrap">
        <header>
            <div class="inner">
                <h1><a href="index.html"><img src="../onsaemiro/img/logo_1.svg" alt="온새미로 로고"></a></h1>
                <nav>
                    <ul>
                        <li><a href="#">대표 농산물</a></li>
                        <li><a href="#">온새미로 이야기</a></li>
                        <li><a href="#">농장 갤러리</a></li>
                        <li><a href="#">주문 / 문의하기</a></li>
                    </ul>
                </nav>
                <button class="menu-btn">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
            </div>
        </header>
        
        <main>
            <section class="hero-sec">
               <div class="hero-txt">
                 <h2>자연 그대로의 정성을 담다<br>온새미로 농장</h2>
                 <p>언제나 변함없이, 건강한 먹거리를 위해 정성을 다합니다.</p>
               </div>
            </section>

            <section class="products-sec">
                 <img src="../onsaemiro/img/cherry.svg" alt="" class="deco cherry-1">
                 <img src="../onsaemiro/img/cherry.svg" alt="" class="deco cherry-2">
                 <img src="../onsaemiro/img/apple.svg" alt="" class="deco apple-3">
                 <img src="../onsaemiro/img/apple.svg" alt="" class="deco apple-4">
                 <img src="../onsaemiro/img/apple.svg" alt="" class="deco apple-5">
                 
                <div class="products-main">
                    <div class="promain-txt">
                        <h3>온새미로 농산물</h3>
                        <p>계절의 흐름을 따라 가장 좋은 시기에 수확합니다.</p>
                    </div>
                    <div class="promain-list">
                        <img src="../onsaemiro/img/red-cherry.png" alt="레이니어체리">
                        <img src="../onsaemiro/img/yell-cherry.png" alt="노란체리">
                        <img src="../onsaemiro/img/apple1.png" alt="사과">
                    </div>
                </div>

                <div class="products-grid">
                    <div class="progrid-txt">
                        <h3>함께 만나볼 수 있어요</h3>
                        <p>계절에 따라 다양한 농산물도 함께 판매하고 있습니다.</p>
                    </div>
                    <div class="season-tabs">
                        <button data-season="spring">봄</button>
                        <button class="active" data-season="summer">여름</button>
                        <button data-season="fall">가을</button>
                        <button data-season="winter">겨울</button>
                    </div>
                    <div class="progrid-slider swiper g-slider">
                        <div class="swiper-wrapper">
                            <div class="swiper-slide"><img src="../onsaemiro/img/progrid(1).png" alt="노란체리"></div>
                            <div class="swiper-slide"><img src="../onsaemiro/img/progrid(2).png" alt="마늘"></div>
                            <div class="swiper-slide"><img src="../onsaemiro/img/progrid(3).png" alt="사과"></div>
                            <div class="swiper-slide"><img src="../onsaemiro/img/progrid(4).png" alt="옥수수"></div>
                            <div class="swiper-slide"><img src="../onsaemiro/img/progrid(5).png" alt="깻잎"></div>
                            <div class="swiper-slide"><img src="../onsaemiro/img/progrid(1).png" alt="노란체리"></div>
                            <div class="swiper-slide"><img src="../onsaemiro/img/progrid(2).png" alt="마늘"></div>
                            <div class="swiper-slide"><img src="../onsaemiro/img/progrid(3).png" alt="사과"></div>
                        </div>
                    </div>
                    <div class="swiper-direction">
                        <div class="swiper-button-prev"></div>
                        <div class="swiper-button-next"></div>
                    </div>
                    <div class="swiper-pagination"></div>
                </div>
            </section>
        </main>

        <footer></footer>
    </div>
     
    <script src="../onsaemiro/main.js"></script>
</body>
</html>
